                      master_id: 5
                      master_name: Auto Service
                      working_hours: 09:00-18:00
                      slots:
                      - start: 09:00
                        end: '11:00'
                        available: true
                      - start: '11:00'
                        end: '13:00'
                        available: false
                        order_id: 123
                      - start: '13:00'
                        end: '15:00'
                        available: true
