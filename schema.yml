              $ref: '#/components/schemas/CarRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
          description: ''
        '400':
          content:
            application/json:
              schema:
