  /api/order/by-master/:
    get:
      operationId: order_by_master_list
      description: "\n## Описание\nВозвращает список заказов, назначенных текущему\
        \ мастеру (master берется из header/token).\n\n## Фильтры (все необязательные)\n\
        \n### 1. Статус заказа (status)\n- Значения: pending, in_progress, completed,\
        \ cancelled, rejected\n- Пример: `status=in_progress`\n\n### 2. Приоритет\
        \ (priority)\n- Значения: low (низкий), high (высокий)\n- Пример: `priority=high`\n\
        \n### 3. Тип проблемы (category)\n- ID категории типа **by_order**\n- Использует\
        \ **smart filter** через дерево parent категории\n- Пример: `category=1` —\
        \ заказы с той же категорией, соседями (общий parent), родителем или дочерними\n\
        \n### 4. Район (location)\n- Поиск по адресу заказа\n- Пример: `location=Ташкент`\
        \ или `location=Навои`\n- Поиск нечувствителен к регистру\n\n### 5. Тип ТС\
        \ (car_category)\n- ID категории машины типа **by_car**\n- Прямой фильтр по\
        \ ID\n- Пример: `car_category=3` (где 3 - это \"Легковой\")\n\n### 6. Географическая\
        \ область (4 точки)\n- Фильтр по координатам (полигон)\n- Требуется указать\
        \ все 4 точки\n- Пример: `point1_lat=41.3&point1_lon=69.2&point2_lat=...`\n\
        \n### 7. Новые заказы (is_new)\n- Фильтр для отображения новых заказов\n-\
        \ Значение: `true` или `false`\n- Показывает заказы без назначенного master\
        \ (FK master пустой)\n- Пример: `is_new=true`\n\n### 8. В работе (is_work)\n\
        - Фильтр для заказов в работе\n- Значение: `true` или `false`\n- Показывает\
        \ заказы текущего мастера со статусом IN_PROGRESS\n- Пример: `is_work=true`\n\
        \n### 9. Архив (is_archive)\n- Фильтр для завершенных заказов\n- Значение:\
        \ `true` или `false`\n- Показывает заказы текущего мастера со статусом COMPLETED\n\
        - Пример: `is_archive=true`\n\n### 10. Тип заказа (order_type)\n- Фильтр по\
        \ типу заказа\n- Значения: `scheduled` (запланированный) или `sos` (экстренный)\n\
        - Пример: `order_type=scheduled` - показывает только запланированные заказы\n\
        - Пример: `order_type=sos` - показывает только SOS заказы\n\n## Pagination\n\
        - По умолчанию 10 заказов на страницу\n- Можно изменить через `page_size`\
        \ (макс. 100)\n\n## Примеры запросов\n\n**Базовый:**\n```\nGET /api/order/by-master/\n\
        ```\n\n**Новые заказы:**\n```\nGET /api/order/by-master/?is_new=true\n```\n\
        \n**Заказы в работе:**\n```\nGET /api/order/by-master/?is_work=true\n```\n\
        \n**Завершенные заказы (архив):**\n```\nGET /api/order/by-master/?is_archive=true\n\
        ```\n\n**С фильтром по статусу:**\n```\nGET /api/order/by-master/?status=in_progress\n\
        ```\n\n**С фильтром по проблеме (smart filter):**\n```\nGET /api/order/by-master/?category=1\n\
        ```\n\n**С несколькими фильтрами:**\n```\nGET /api/order/by-master/?status=pending&priority=high&category=1&location=Ташкент\n\
        ```\n\n**Только запланированные заказы (Order by Date):**\n```\nGET /api/order/by-master/?order_type=scheduled\n\
        ```\n\n**Только SOS заказы (экстренные):**\n```\nGET /api/order/by-master/?order_type=sos\n\
        ```\n\n**Запланированные заказы со статусом pending:**\n```\nGET /api/order/by-master/?order_type=scheduled&status=pending\n\
        ```\n        "
      summary: Получить заказы текущего мастера
      parameters:
      - in: query
        name: car_category
        schema:
          type: integer
        description: Фильтр по типу ТС (ID категории машины типа by_car)
      - in: query
        name: category
        schema:
          type: integer
        description: Фильтр по типу проблемы. ID категории by_order. Smart filter
          по parent-дереву.
      - in: query
        name: is_archive
        schema:
          type: boolean
        description: Завершенные заказы (status=COMPLETED)
      - in: query
        name: is_new
        schema:
          type: boolean
        description: Новые заказы (master не назначен)
      - in: query
        name: is_work
        schema:
          type: boolean
        description: Заказы в работе (status=IN_PROGRESS)
      - in: query
        name: location
        schema:
          type: string
        description: Фильтр по району (поиск по адресу заказа)
      - in: query
        name: order_type
        schema:
          type: string
          enum:
          - scheduled
          - sos
        description: Фильтр по типу заказа (scheduled - запланированные, sos - экстренные)
      - in: query
        name: page
        schema:
          type: integer
        description: Номер страницы для пагинации
      - in: query
        name: page_size
        schema:
          type: integer
        description: Количество заказов на странице (макс. 100)
      - in: query
        name: point1_lat
        schema:
          type: number
          format: float
        description: Широта точки 1 (для географического фильтра)
      - in: query
        name: point1_lon
        schema:
          type: number
          format: float
        description: Долгота точки 1
      - in: query
        name: point2_lat
        schema:
          type: number
          format: float
        description: Широта точки 2
      - in: query
        name: point2_lon
        schema:
          type: number
          format: float
        description: Долгота точки 2
      - in: query
        name: point3_lat
        schema:
          type: number
          format: float
        description: Широта точки 3
      - in: query
        name: point3_lon
        schema:
          type: number
          format: float
        description: Долгота точки 3
      - in: query
        name: point4_lat
        schema:
          type: number
          format: float
        description: Широта точки 4
      - in: query
        name: point4_lon
        schema:
          type: number
          format: float
        description: Долгота точки 4
      - in: query
        name: priority
        schema:
          type: string
          enum:
          - high
          - low
        description: Фильтр по приоритету (low, high)
      - in: query
        name: status
        schema:
          type: string
          enum:
          - accepted
          - arrived
          - cancelled
          - completed
          - in_progress
          - on_the_way
          - pending
          - rejected
        description: Фильтр по статусу заказа
      tags:
      - Order (Master) — My orders
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrderList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
  /api/order/by-user/:
    get:
      operationId: order_by_user_list
      description: "\n## Описание\nВозвращает все заказы текущего авторизованного\
        \ пользователя (user берется из header/token).\n\n## Фильтры (все необязательные)\n\
        \n### 1. Статус заказа (status)\n- Значения: pending, in_progress, completed,\
        \ cancelled, rejected\n- Пример: `status=in_progress`\n\n### 2. Приоритет\
        \ (priority)\n- Значения: low (низкий), high (высокий)\n- Пример: `priority=high`\n\
        \n### 3. Тип проблемы (category)\n- ID категории типа **by_order**\n- Использует\
        \ **smart filter** через дерево parent категории\n- Пример: `category=1` —\
        \ заказы с той же категорией, соседями (общий parent), родителем или дочерними\n\
        \n### 4. Район (location)\n- Поиск по адресу заказа\n- Пример: `location=Ташкент`\
        \ или `location=Навои`\n- Поиск нечувствителен к регистру\n\n### 5. Тип ТС\
        \ (car_category)\n- ID категории машины типа **by_car**\n- Прямой фильтр по\
        \ ID\n- Пример: `car_category=3` (где 3 - это \"Легковой\")\n\n### 6. Тип\
        \ заказа (order_type)\n- Фильтр по типу заказа\n- Значения: `scheduled` (запланированный)\
        \ или `sos` (экстренный)\n- Пример: `order_type=scheduled` - показывает только\
        \ запланированные заказы\n- Пример: `order_type=sos` - показывает только SOS\
        \ заказы\n\n### 7. Имя мастера (name)\n- Поиск по имени мастера\n- Пример:\
        \ `name=Алексей`\n\n## Pagination\n- По умолчанию 10 заказов на страницу\n\
        - Можно изменить через `page_size` (макс. 100)\n\n## Примеры запросов\n\n\
        **Базовый:**\n```\nGET /api/order/by-user/\n```\n\n**С фильтром по статусу:**\n\
        ```\nGET /api/order/by-user/?status=in_progress\n```\n\n**С фильтром по проблеме\
        \ (smart filter):**\n```\nGET /api/order/by-user/?category=1\n```\n\n**С несколькими\
        \ фильтрами:**\n```\nGET /api/order/by-user/?status=pending&priority=high&category=1&location=Ташкент\n\
        ```\n\n**Только запланированные заказы (Order by Date):**\n```\nGET /api/order/by-user/?order_type=scheduled\n\
        ```\n\n**Только SOS заказы (экстренные):**\n```\nGET /api/order/by-user/?order_type=sos\n\
        ```\n\n**Запланированные заказы со статусом pending:**\n```\nGET /api/order/by-user/?order_type=scheduled&status=pending\n\
        ```\n        "
      summary: Получить заказы текущего пользователя
      parameters:
      - in: query
        name: car_category
        schema:
          type: integer
        description: Фильтр по типу ТС (ID категории машины типа by_car)
      - in: query
        name: category
        schema:
          type: integer
        description: Фильтр по типу проблемы. ID категории by_order. Smart filter
          по parent-дереву.
      - in: query
        name: location
        schema:
          type: string
        description: Фильтр по району (поиск по адресу заказа)
      - in: query
        name: name
        schema:
          type: string
        description: Поиск по имени мастера
      - in: query
        name: order_type
        schema:
          type: string
          enum:
          - scheduled
          - sos
        description: Фильтр по типу заказа (scheduled - запланированные, sos - экстренные)
      - in: query
        name: page
        schema:
          type: integer
        description: Номер страницы для пагинации
      - in: query
        name: page_size
        schema:
          type: integer
        description: Количество заказов на странице (макс. 100)
      - in: query
        name: priority
        schema:
          type: string
          enum:
          - high
          - low
        description: Фильтр по приоритету (low, high)
      - in: query
        name: status
        schema:
          type: string
          enum:
          - accepted
          - arrived
          - cancelled
          - completed
          - in_progress
          - on_the_way
          - pending
          - rejected
        description: Фильтр по статусу заказа
      tags:
      - Order (Driver) — My orders
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrderList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
  /api/order/nearby-masters/:
    get:
      operationId: order_nearby_masters_list
      description: "\nТот же движок, что **`GET /api/master/masters/list/`** (Haversine,\
        \ `distance` в ответе).\n\n**Обязательно в query:** `lat`, `long`. (В коде\
        \ также принимаются синонимы `latitude` / `longitude` — в Swagger они не дублируются.)\n\
        \n**По умолчанию:** `radius=50` км.\n\n**Опционально:** `category`, `name`.\n\
        \nJWT обязателен.\n        "
      summary: Кандидаты-мастера рядом (выбор для заказа)
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: lat
        schema:
          type: number
          format: double
        description: Широта точки поиска
        required: true
      - in: query
        name: long
        schema:
          type: number
          format: double
        description: Долгота точки поиска
        required: true
      - in: query
        name: name
        schema:
          type: string
      - in: query
        name: radius
        schema:
          type: number
          format: double
        description: Радиус в км (по умолчанию 50)
      tags:
      - Order (Driver) — Create
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Master'
          description: ''
  /api/order/reviews/create/:
    post:
      operationId: order_reviews_create_create
      description: "\n## Описание\nСоздает отзыв о выполненном заказе. Рейтинг автоматически\
        \ применяется ко всем мастерам, \nназначенным на заказ (главный мастер и все\
        \ мастера из списка).\n\n## \U0001F3AF Когда использовать?\n- ✅ После завершения\
        \ заказа (status = COMPLETED)\n- ✅ Клиент хочет оценить работу мастера\n-\
        \ ✅ Один раз на заказ (повторные отзывы запрещены)\n\n## Request Body\n- `order_id`:\
        \ ID завершенного заказа (обязательно)\n- `rating`: Рейтинг от 1 до 5 (обязательно)\n\
        - `comment`: Текст отзыва (необязательно)\n- `tag`: Что понравилось в работе\
        \ мастера - выберите ОДНО (обязательно):\n  - `fast_work` - Оперативная работа\n\
        \  - `no_overpay` - Без переплат\n  - `deadline` - Соблюдение сроков\n  -\
        \ `always_available` - Всегда на связи\n  - `individual_approach` - Индивидуальный\
        \ подход\n  - `polite` - Вежливость\n\n## Пример запроса:\n```json\n{\n  \"\
        order_id\": 5,\n  \"rating\": 5,\n  \"comment\": \"Отличная работа! Быстро\
        \ и качественно.\",\n  \"tag\": \"fast_work\"\n}\n```\n\n## Response:\n```json\n\
        {\n  \"message\": \"Отзыв успешно создан. Рейтинг применен к мастерам.\",\n\
        \  \"review\": {\n    \"id\": 1,\n    \"order\": 5,\n    \"rating\": 5,\n\
        \    \"comment\": \"Отличная работа!\",\n    \"tag\": \"fast_work\",\n   \
        \ \"tag_display\": \"Оперативная работа\",\n    \"created_at\": \"2026-01-31T10:00:00Z\"\
        \n  }\n}\n```\n\n## Что происходит автоматически:\n1. ✅ Отзыв сохраняется\
        \ в БД\n2. ✅ Рейтинг обновляется у мастера заказа (`order.master`)\n3. ✅ Средний\
        \ рейтинг сохраняется в профиле мастера\n        "
      summary: Создать отзыв о заказе
      tags:
      - Order (Driver) — Reviews
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                examples:
                  not_completed:
                    value:
                      error: Отзыв можно оставить только для завершенного заказа
                  already_exists:
                    value:
                      error: Отзыв для этого заказа уже оставлен
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: Order not found
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
  /api/order/scheduled/:
    post:
      operationId: order_scheduled_create
      description: "\n# Scheduled order (Order by Date)\n\nThis endpoint creates a\
        \ **scheduled order** when the client:\n- Selects master/workshop in advance\n\
        - Selects visit date and time slot (e.g. 10:00-11:00)\n- Specifies required\
        \ services\n\n## When to use\n\n- Planned maintenance (oil change, tire fitting,\
        \ diagnostics)\n- Booking a specific time\n- Client has chosen a workshop\
        \ from the list\n\nDo NOT use for **emergencies** (use `/api/order/sos/`).\n\
        \n## Required fields\n\n- **order_type**: always \"scheduled\"\n- **text**:\
        \ service description\n- **car_list**: list of client car IDs [1, 2]\n- **category_list**:\
        \ list of service category IDs [1, 2]\n- **master_id**: selected master/workshop\
        \ ID\n- **scheduled_date**: visit date (YYYY-MM-DD)\n- **scheduled_time_start**,\
        \ **scheduled_time_end**: time slot (HH:MM)\n- **location**, **latitude**,\
        \ **longitude**: workshop address and coordinates\n\n## Validation\n\n1. Visit\
        \ date must not be in the past\n2. Start time must be before end time\n3.\
        \ Distance to master <= 50 km\n        "
      summary: Create scheduled order (Order by Date)
      tags:
      - Order (Driver) — Create
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - order_type
              - master_id
              - scheduled_date
              - scheduled_time_start
              - scheduled_time_end
              - text
              - location
              - latitude
              - longitude
              - car_list
              - category_list
              properties:
                order_type:
                  type: string
                  enum:
                  - scheduled
                  description: Order type (always "scheduled")
                  example: scheduled
                master_id:
                  type: integer
                  description: Master/workshop ID (required)
                  example: 5
                scheduled_date:
                  type: string
                  format: date
                  description: Visit date (YYYY-MM-DD)
                  example: '2026-01-30'
                scheduled_time_start:
                  type: string
                  format: time
                  description: Start time (HH:MM)
                  example: '14:00'
                scheduled_time_end:
                  type: string
                  format: time
                  description: End time (HH:MM)
                  example: '15:00'
                text:
                  type: string
                  description: Service description
                  example: Oil and filter change
                location:
                  type: string
                  description: Workshop address
                  example: Auto Service, Main St. 15
                latitude:
                  type: number
                  description: Workshop latitude
                  example: 41.3111
                longitude:
                  type: number
                  description: Workshop longitude
                  example: 69.2797
                car_list:
                  type: array
                  items:
                    type: integer
                  description: List of car IDs
                  example:
                  - 2
                category_list:
                  type: array
                  items:
                    type: integer
                  description: List of category IDs
                  example:
                  - 1
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                description: Order created successfully
                content:
                  application/json:
                    example:
                      message: Your order has been created and sent to the master
                      order:
                        id: 123
                        order_type: scheduled
                        status: pending
                        scheduled_date: '2026-01-30'
                        scheduled_time_start: '14:00'
                        scheduled_time_end: '15:00'
                        master:
                          id: 5
                          name: Auto Service
                        text: Oil and filter change
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Validation error
                content:
                  application/json:
                    examples:
                      missing_master:
                        summary: Master not specified
                        value:
                          master_id:
                          - Master is required for scheduled order
                      missing_date:
                        summary: Date not specified
                        value:
                          scheduled_date:
                          - Visit date is required for scheduled order
                      past_date:
                        summary: Date in past
                        value:
                          scheduled_date:
                          - Visit date cannot be in the past
                      distance_error:
                        summary: Master too far
                        value:
                          master_id:
                          - 'Selected master is too far (150.5 km). Maximum distance:
                            50 km.'
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Not authenticated
          description: ''
  /api/order/services-list/:
    get:
      operationId: order_services_list_retrieve
      description: "\n## Описание\nВозвращает список всех услуг (MasterServiceItems)\
        \ для указанного мастера.\nФормат ответа аналогичен формату в detail мастера.\n\
        \n## Параметры\n- `master_id`: ID мастера (обязательный)\n\n## Пример запроса:\n\
        ```\nGET /api/order/services-list/?master_id=5\n```\n\n## Response\nВозвращает\
        \ навыки мастера: подкатегория каталога (by_order) + цена мастера.\n     \
        \   "
      summary: Получить услуги мастера
      parameters:
      - in: query
        name: master_id
        schema:
          type: integer
        description: ID мастера
        required: true
      tags:
      - Order (Driver) — Legacy
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    category:
                      type: integer
                    service_name:
                      type: string
                    parent_category_id:
                      type: integer
                      nullable: true
                    parent_category_name:
                      type: string
                      nullable: true
                    price:
                      type: number
                    master_service:
                      type: integer
                example:
                - id: 1
                  category: 12
                  service_name: Headlight Restoration
                  parent_category_id: 3
                  parent_category_name: Lights
                  price: 100.0
                  master_service: 5
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: Параметр master_id обязателен
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: Master not found
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
  /api/order/sos/:
    post:
      operationId: order_sos_create
      description: "\n# SOS order (Emergency assistance)\n\nThis endpoint creates\
        \ an **emergency order** when the client:\n- Is in an **emergency** (car broke\
        \ down, flat tire, etc.)\n- Needs **immediate assistance**\n- Sends current\
        \ **GPS location**\n- System finds nearest available masters within radius\n\
        \n## When to use\n\n- Car broke down on the road\n- Flat tire on the highway\n\
        - Engine won't start\n- Any emergency requiring immediate help\n\nDo NOT use\
        \ for **planned work** (use `/api/order/scheduled/`).\n\n## Required fields\n\
        \n- **order_type**: always \"sos\"\n- **master_id**: optional — если не указан,\
        \ система берёт ближайших мастеров с выбранной услугой (**by_order**), шлёт\
        \ по WebSocket, **30 сек** на ответ, затем следующий мастер.\n- **text**:\
        \ problem description\n- **priority**: optional (default **high**)\n- **car_list**,\
        \ **category_list**: car and category IDs (**нужна хотя бы одна by_order**\
        \ категория, если master_id нет)\n- **location**, **latitude**, **longitude**:\
        \ current location (GPS)\n\n## Validation\n\n- Если **master_id** указан:\
        \ расстояние до мастера в пределах его зоны.\n- Если нет: очередь мастеров\
        \ по расстоянию и услуге; **ws/sos/master/?token=JWT** для мастера.\n    \
        \    "
      summary: Create SOS order (emergency assistance)
      tags:
      - Order (Driver) — Create
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - order_type
              - text
              - location
              - latitude
              - longitude
              - car_list
              - category_list
              properties:
                order_type:
                  type: string
                  enum:
                  - sos
                  description: Order type (always "sos")
                  example: sos
                master_id:
                  type: integer
                  description: Master/workshop ID (optional; auto-queue if omitted)
                  example: 5
                priority:
                  type: string
                  enum:
                  - low
                  - high
                  description: Optional; default high
                  example: high
                text:
                  type: string
                  description: Problem description
                  example: Flat tire on highway
                location:
                  type: string
                  description: Current location description
                  example: Highway M39, km 45, near Shell station
                latitude:
                  type: number
                  description: Current latitude (GPS)
                  example: 41.2548
                longitude:
                  type: number
                  description: Current longitude (GPS)
                  example: 69.2107
                car_list:
                  type: array
                  items:
                    type: integer
                  description: List of car IDs
                  example:
                  - 2
                category_list:
                  type: array
                  items:
                    type: integer
                  description: List of category IDs
                  example:
                  - 1
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                description: SOS order created successfully
                content:
                  application/json:
                    example:
                      message: Your emergency order has been sent to the master
                      order:
                        id: 456
                        order_type: sos
                        status: pending
                        priority: high
                        master:
                          id: 5
                          name: Auto Service
                        location: Highway M39, km 45
                        latitude: 41.2548
                        longitude: 69.2107
                        text: Flat front right tire
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Validation error
                content:
                  application/json:
                    examples:
                      missing_master:
                        summary: Master not specified
                        value:
                          master_id:
                          - Master is required for SOS order
                      missing_location:
                        summary: Location not specified
                        value:
                          latitude:
                          - This field is required
                          longitude:
                          - This field is required
                      distance_error:
                        summary: Master too far
                        value:
                          master_id:
                          - 'Selected master is too far (150.5 km). Maximum distance:
                            50 km.'
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Not authenticated
          description: ''
