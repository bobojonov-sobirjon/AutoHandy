                      summary:
                        subcategories_total: 8
                        with_skill: 2
                        missing: 6
                      groups:
                      - parent:
                          id: 26
                          name: Roadside Assistance
                          icon: https://example.com/media/categories/icons/x.png
                        items:
                        - id: 31
