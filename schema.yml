  /api/master/masters/list/:
    get:
      operationId: master_masters_list_list
      description: "\n        Получить список мастеров с обязательной фильтрацией.\
        \ \n        \n        **ВАЖНО**: Если фильтры не указаны, возвращается пустой\
        \ список!\n        \n        **Параметры фильтрации:**\n        - `category`\
        \ - ID категории (by_order или by_master). При by_order — умный поиск по дереву\
        \ parent и названию\n        - `name` - Название мастерской (поиск\
        \ по частичному совпадению)\n        - `lat` - Широта текущего местоположения\
        \ пользователя (требуется вместе с long и radius)\n        - `long` - Долгота\
        \ текущего местоположения пользователя (требуется вместе с lat и radius)\n\
        \        - `radius` - Радиус поиска в километрах (по умолчанию 10 км, требуется\
        \ вместе с lat и long)\n        \n        **Примеры использования:**\n   \
        \     - `/api/master/masters/list/?category=1` - мастера по категории (умный\
        \ поиск)\n        - `/api/master/masters/list/?name=Авто` - поиск по названию\n\
        \        - `/api/master/masters/list/?lat=41.3111&long=69.2797&radius=5` -\
        \ мастера в радиусе 5 км\n        - `/api/master/masters/list/?category=1&lat=41.3111&long=69.2797&radius=10`\
        \ - комбинация фильтров\n        \n        **Умный поиск по категории:**\n\
        \        - Если category типа by_order: ищет мастеров через MasterServiceItems\
        \ по дереву parent и названию\n        - Если category типа by_master: прямой\
        \ поиск по категории мастера\n        - Точность поиска: 80-90%\n        \n\
        \        **Геолокация:**\n        - Расчет расстояния выполняется по формуле\
        \ Haversine\n        - Возвращаются только мастера с заполненными координатами\
        \ (latitude и longitude)\n        - Поле `distance` добавляется в ответ (расстояние\
        \ в километрах от точки пользователя)\n        "
      summary: Получить список мастеров с фильтрацией
      parameters:
      - in: query
        name: category
        schema:
          type: integer
        description: ID категории мастера
      - in: query
        name: lat
        schema:
          type: number
          format: double
        description: Широта текущего местоположения пользователя
      - in: query
        name: long
        schema:
          type: number
          format: double
        description: Долгота текущего местоположения пользователя
      - in: query
        name: name
        schema:
          type: string
        description: Название мастерской (поиск по частичному совпадению)
      - in: query
        name: radius
        schema:
          type: number
          format: double
        description: Радиус поиска в километрах (по умолчанию 10 км)
      tags:
      - Masters
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Master'
          description: ''
