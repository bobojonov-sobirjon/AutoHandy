      description: Создать новую машину
      summary: Создать новую машину
      tags:
      - Cars
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CarCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CarCreateRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/CarCreateRequest'
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
  /api/car/{id}/:
