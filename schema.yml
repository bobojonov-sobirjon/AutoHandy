openapi: 3.0.3
info:
  title: AutoHandy APIs
  version: v1
  description: AutoHandy Apies - JWT Authentication Required
  contact:
    name: API Support
    email: contact@snippets.local
  license:
    name: BSD License
paths:
  /api/auth/check-sms-code/:
    post:
      operationId: auth_check_sms_code_create
      description: Проверка SMS кода и получение JWT токена. Параметр 'role' (Driver,
        Master или Owner) обязателен.
      summary: Проверка SMS кода
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SMSVerificationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SMSVerificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SMSVerificationRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/SMSVerificationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  errors:
                    type: object
                  error:
                    type: string
          description: ''
        '500':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
          description: ''
  /api/auth/faq/:
    get:
      operationId: auth_faq_retrieve
      description: Получение списка всех активных FAQ. Доступно без авторизации.
      summary: Получение списка FAQ
      tags:
      - FAQ
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 5
                  faqs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        question:
                          type: string
                          example: Как зарегистрироваться в системе?
                        answer:
                          type: string
                          example: Для регистрации...
                        order:
                          type: integer
                          example: 1
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Отправка 4-значного кода подтверждения на номер телефона (SMS)
        или email. Если пользователь не найден, создается новый пользователь автоматически.
        Параметр 'role' (Driver, Master или Owner) обязателен.
      summary: Отправка кода подтверждения
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentifierRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/IdentifierRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/IdentifierRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/IdentifierRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Код подтверждения отправлен на email
                  identifier:
                    type: string
                    example: user@example.com
                  identifier_type:
                    type: string
                    example: email
                  phone:
                    type: string
                    example: '998901234567'
                    description: Номер телефона (только для phone)
                  email:
                    type: string
                    example: user@example.com
                    description: Email адрес (только для email)
                  user_exists:
                    type: boolean
                    example: true
                  sms_code:
                    type: string
                    example: '1234'
                    description: SMS код подтверждения
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  errors:
                    type: object
          description: ''
        '500':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
          description: ''
  /api/auth/oauth/token/:
    post:
      operationId: auth_oauth_token_create
      description: OAuth2 password flow for Swagger - email only authentication
      summary: OAuth2 Token Endpoint
      tags:
      - Authentication
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  example: password
                username:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: password
              required:
              - grant_type
              - username
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 604800
                  scope:
                    type: string
                    example: read write
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string
          description: ''
  /api/auth/sms-status/:
    get:
      operationId: auth_sms_status_retrieve
      description: Проверка статуса SMS сервиса SMSC.ru и баланса
      summary: Проверка статуса SMS сервиса
      tags:
      - SMS Service
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  service:
                    type: string
                    example: SMSC.ru
                  balance:
                    type: number
                    example: 150.5
                  currency:
                    type: string
                    example: RUB
                  status:
                    type: string
                    example: active
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
          description: ''
  /api/auth/update-telegram-chat-id/:
    post:
      operationId: auth_update_telegram_chat_id_create
      description: Обновляет Telegram Chat ID текущего пользователя для получения
        SMS
      summary: Обновить Telegram Chat ID
      tags:
      - User Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramChatIdRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TelegramChatIdRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TelegramChatIdRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/TelegramChatIdRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Telegram Chat ID успешно обновлен
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  errors:
                    type: object
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
  /api/auth/user/:
    get:
      operationId: auth_user_retrieve
      description: Получение детальной информации о текущем авторизованном пользователе
      summary: Получение информации о пользователе
      tags:
      - User Profile
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Authentication credentials were not provided.
          description: ''
    put:
      operationId: auth_user_update
      description: Обновление информации о текущем пользователе. Поддерживает обновление
        всех полей, включая avatar (файл) и роль (группу).
      summary: Обновление информации о пользователе
      tags:
      - User Profile
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Информация о пользователе успешно обновлена
                  user:
                    type: object
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  errors:
                    type: object
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Authentication credentials were not provided.
          description: ''
    patch:
      operationId: auth_user_partial_update
      description: Частичное обновление информации о текущем пользователе. Можно обновить
        только нужные поля. Поддерживает avatar (файл) и роль (группу).
      summary: Частичное обновление информации о пользователе
      tags:
      - User Profile
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Информация о пользователе успешно обновлена
                  user:
                    type: object
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  errors:
                    type: object
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Authentication credentials were not provided.
          description: ''
  /api/car/:
