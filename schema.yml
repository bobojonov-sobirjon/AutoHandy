  /api/order/available/:
    get:
      operationId: order_available_retrieve
      description: "\n## Описание\nВозвращает список доступных заказов (без назначенного\
        \ мастера) в радиусе от местоположения мастера.\n\n## Обязательные параметры\n\
        - **master_id** - ID мастера (координаты берутся из профиля мастера)\n\n##\
        \ Необязательные параметры\n- **radius** - Радиус поиска в километрах (по\
        \ умолчанию 10 км, можно увеличить до 50+ км)\n\n## Фильтры (все необязательные)\n\
        \n### 1. Тип проблемы (category)\n- ID категории типа **by_order**\n- Использует\
        \ **smart filter** через дерево parent категории\n- Пример: `category=1` —\
        \ заказы с той же категорией, соседями (общий parent), родителем или дочерними\n\
        \n### 2. Район (location)\n- Поиск по адресу заказа\n- Пример: `location=Ташкент`\
        \ или `location=Навои`\n- Поиск нечувствителен к регистру (case-insensitive)\n\
        \n### 3. Тип ТС (car_category)\n- ID категории машины типа **by_car**\n- Прямой\
        \ фильтр по ID\n- Пример: `car_category=3` (где 3 - это \"Легковой\")\n\n\
        ### 4. Приоритет (priority)\n- Уровень приоритета заказа\n- Значения: `low`\
        \ (низкий) или `high` (высокий)\n- Пример: `priority=high`\n\n## Логика работы\n\
        1. Базовая точка: координаты мастера на карте (`latitude` / `longitude`).\n\
        2. Радиус: если задан **service_area_radius_miles** (15/45/100), используется\
        \ он (в км); иначе query-параметр **radius** (км, по умолчанию 10).\n3. Заказы\
        \ без назначенного master (FK пустой), с координатами.\n4. Доп. фильтры: category,\
        \ location, car_category, priority; расстояние Haversine; сортировка по расстоянию.\n\
        \n## Pagination\n- По умолчанию 10 заказов на страницу\n- Можно изменить через\
        \ `page_size` (макс. 100)\n- Навигация через `page` (номер страницы)\n\n##\
        \ Примеры запросов\n\n**Базовый (только обязательные параметры):**\n```\n\
        GET /api/order/available/?master_id=5\n```\n\n**С радиусом:**\n```\nGET /api/order/available/?master_id=5&radius=20\n\
        ```\n\n**С фильтром по проблеме:**\n```\nGET /api/order/available/?master_id=5&radius=15&category=1\n\
        ```\n\n**С несколькими фильтрами:**\n```\nGET /api/order/available/?master_id=5&radius=15&category=1&location=Ташкент&car_category=3&priority=high\n\
        ```\n\n**С пагинацией:**\n```\nGET /api/order/available/?master_id=5&radius=10&page=2&page_size=20\n\
        ```\n        "
      summary: Получить доступные заказы для мастера
      parameters:
      - in: query
        name: car_category
        schema:
          type: integer
        description: 'Фильтр по типу ТС. ID категории машины типа by_car (например:
          3 для "Легковой").'
      - in: query
        name: category
        schema:
          type: integer
        description: Фильтр по типу проблемы. ID категории by_order. Smart filter
          по parent-дереву.
      - in: query
        name: location
        schema:
          type: string
        description: 'Фильтр по району. Поиск по адресу заказа (например: "Ташкент",
          "Навои", "ул. Амира Темура").'
      - in: query
        name: master_id
        schema:
          type: integer
        description: 'ID мастера (обязательно). Точка отсчёта: рабочая зона, иначе
          профиль.'
        required: true
      - in: query
        name: page
        schema:
          type: integer
        description: Номер страницы для пагинации. Начинается с 1.
      - in: query
        name: page_size
        schema:
          type: integer
        description: Количество заказов на странице. По умолчанию 10, максимум 100.
      - in: query
        name: priority
        schema:
          type: string
        description: 'Фильтр по приоритету. Допустимые значения: "low" (низкий) или
          "high" (высокий).'
      - in: query
        name: radius
        schema:
          type: number
          format: float
        description: Радиус в км, если у мастера нет service_area_radius_miles; иначе
          игнорируется.
      tags:
      - Order (Master) — Available & accept
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Успешный ответ с пагинацией
                content:
                  application/json:
                    example:
                      count: 5
                      next: http://localhost:8000/api/order/available/?master_id=5&page=2
                      previous: null
                      results:
                      - id: 10
                        user:
                          id: 4
                          private_id: '829137'
                          full_name: Иван Иванов
                          phone_number: '998914495644'
                          email: ivan@example.com
                          avatar: http://localhost:8000/media/avatars/avatar.jpg
                        car_data:
                        - id: 2
                          brand: Toyota
                          model: Camry
                          year: 2020
                          category:
                            id: 3
                            name: Легковой
                            type_category: by_car
                        category_data:
                        - id: 1
                          name: Пробито колесо
                          type_category: by_order
                          parent: null
                        text: Нужна помощь с заменой колеса
                        status: pending
                        priority: high
                        location: ул. Навои, д. 15, Ташкент
                        latitude: '41.3111000'
                        longitude: '69.2797000'
                        master: null
                        distance: 2.35
                        created_at: '2026-01-21T12:00:00Z'
                        updated_at: '2026-01-21T12:00:00Z'
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Ошибка валидации параметров
                content:
                  application/json:
                    examples:
                      missing_master_id:
                        summary: Не указан master_id
                        value:
                          error: Параметр master_id обязателен
                      invalid_format:
                        summary: Неверный формат параметров
                        value:
                          error: Неверный формат параметров
                      no_coordinates:
                        summary: У мастера нет координат
                        value:
                          error: У мастера не указаны координаты
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Не авторизован
                content:
                  application/json:
                    example:
                      detail: Authentication credentials were not provided.
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Мастер не найден
                content:
                  application/json:
                    example:
                      error: Master not found
          description: ''
  /api/order/available-slots/:
    get:
      operationId: order_available_slots_retrieve
      description: "\n# Available time slots\n\nReturns a list of time slots (every\
        \ 2 hours) for booking with a master on a given date.\n\n## Required parameters\n\
        \n- **master_id** (query) - Master/workshop ID\n- **date** (query) - Date\
        \ in YYYY-MM-DD format (e.g. 2026-01-30)\n\n## Response format\n\nEach slot\
        \ has: **start**, **end** (HH:MM), **available** (true/false), **order_id**\
        \ (if occupied).\n        "
