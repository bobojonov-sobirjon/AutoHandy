      tags:
      - Cars
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
    put:
      operationId: car_update
      description: Обновить машину
      summary: Обновить машину
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Cars
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarRequest'
