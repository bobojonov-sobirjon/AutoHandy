                  example: 69.2797
                master_id:
                  type: integer
                  description: ID мастера (необязательно)
                  example: 1
                car_list:
                  type: array
                  items:
                    type: integer
                  description: 'Список ID машин. Необязательно. Пример: [1, 2, 3]'
                  example:
                  - 1
                  - 2
                category_list:
                  type: array
                  items:
                    type: integer
                  description: 'Список ID категорий. Необязательно. Пример: [1, 2,
                    3]'
                  example:
                  - 1
                  - 2
      security:
