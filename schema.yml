                    price_to: 300000
                    category: 1
                  - name: Диагностика двигателя
                    price_from: 50000
                    price_to: 100000
                    category: 2
                  card_number: '8600123456789012'
                  card_expiry_month: 12
                  card_expiry_year: 2026
                  card_cvv: '123'
