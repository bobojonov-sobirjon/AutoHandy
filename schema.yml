openapi: 3.0.3
info:
  title: AutoHandy APIs
  version: v1
  description: AutoHandy Apies - JWT Authentication Required
  contact:
    name: API Support
    email: contact@snippets.local
  license:
    name: BSD License
paths:
  /api/auth/app-version/:
    get:
      operationId: auth_app_version_list
      description: Все записи версий, от новых к старым.
      summary: Список версий приложения
      tags:
      - System
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppVersion'
          description: ''
  /api/auth/app-version/{app_version_id}/:
    get:
      operationId: auth_app_version_retrieve
      summary: Версия приложения по ID
      parameters:
      - in: path
        name: app_version_id
        schema:
          type: integer
        required: true
      tags:
      - System
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppVersion'
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Not found
          description: ''
  /api/auth/check-sms-code/:
    post:
      operationId: auth_check_sms_code_create
      description: Проверка SMS кода и получение JWT токена. Параметр 'role' (Driver,
        Master или Owner) обязателен.
      summary: Проверка SMS кода
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SMSVerificationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SMSVerificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SMSVerificationRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/SMSVerificationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  errors:
                    type: object
                  error:
                    type: string
          description: ''
        '500':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
          description: ''
  /api/auth/email-verification/:
    post:
      operationId: auth_email_verification_create
      description: 'Body: `token` (UUID from email link). Sets is_email_verified and
        is_verified.'
      summary: Confirm email verification
      tags:
      - User Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
          description: ''
  /api/auth/faq/:
    get:
      operationId: auth_faq_retrieve
      description: Получение списка всех активных FAQ. Доступно без авторизации.
      summary: Получение списка FAQ
      tags:
      - FAQ
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 5
                  faqs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        question:
                          type: string
                          example: Как зарегистрироваться в системе?
                        answer:
                          type: string
                          example: Для регистрации...
                        order:
                          type: integer
                          example: 1
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Отправка 4-значного кода подтверждения на номер телефона (SMS)
        или email. Если пользователь не найден, создается новый пользователь автоматически.
        Параметр 'role' (Driver, Master или Owner) обязателен.
      summary: Отправка кода подтверждения
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentifierRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/IdentifierRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/IdentifierRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/IdentifierRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Код подтверждения отправлен на email
                  identifier:
                    type: string
                    example: user@example.com
                  identifier_type:
                    type: string
                    example: email
                  phone:
                    type: string
                    example: '998901234567'
                    description: Номер телефона (только для phone)
                  email:
                    type: string
                    example: user@example.com
                    description: Email адрес (только для email)
                  user_exists:
                    type: boolean
                    example: true
                  sms_code:
                    type: string
                    example: '1234'
                    description: SMS код подтверждения
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  errors:
                    type: object
          description: ''
        '500':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
          description: ''
  /api/auth/oauth/token/:
    post:
      operationId: auth_oauth_token_create
      description: OAuth2 password flow for Swagger - email only authentication
      summary: OAuth2 Token Endpoint
      tags:
      - Authentication
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  example: password
                username:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: password
              required:
              - grant_type
              - username
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 604800
                  scope:
                    type: string
                    example: read write
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string
          description: ''
  /api/auth/sms-status/:
    get:
      operationId: auth_sms_status_retrieve
      description: Check if Twilio SMS is configured. Optionally shows SMSC balance
        if configured.
      summary: SMS service status
      tags:
      - SMS Service
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  service:
                    type: string
                    example: twilio
                  twilio_configured:
                    type: boolean
                  status:
                    type: string
          description: ''
  /api/auth/user/:
    get:
      operationId: auth_user_retrieve
      description: Получение детальной информации о текущем авторизованном пользователе
      summary: Получение информации о пользователе
      tags:
      - User Profile
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Authentication credentials were not provided.
          description: ''
    put:
      operationId: auth_user_update
      description: 'multipart/form-data: только first_name, last_name, avatar, date_of_birth.
        Остальные поля (email и т.д.) меняются через POST /api/auth/user/register-profile/.
        Координаты и address меняются через PUT /api/auth/user/location/.'
      summary: Обновление профиля (ограниченные поля)
      tags:
      - User Profile
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserLimitedProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLimitedProfileUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Profile updated
                  user:
                    type: object
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: object
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
    patch:
      operationId: auth_user_partial_update
      description: 'То же, что PUT: только first_name, last_name, avatar, date_of_birth
        (multipart/form-data).'
      summary: Частичное обновление профиля (ограниченные поля)
      tags:
      - User Profile
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserLimitedProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserLimitedProfileUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  user:
                    type: object
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: object
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
  /api/auth/user/{user_id}/:
    get:
      operationId: auth_user_retrieve_2
      description: "\n## Получить детальную информацию о пользователе\n\nВозвращает\
        \ полную информацию о пользователе по его ID.\nЭтот endpoint может использоваться\
        \ для:\n- Просмотра профиля мастера\n- Получения информации о водителе\n-\
        \ Просмотра рейтинга и отзывов пользователя\n\n## Response включает:\n- Основную\
        \ информацию (имя, email, телефон)\n- Роли пользователя (Driver, Master)\n\
        - Баланс (если есть)\n- Рейтинг и отзывы (для мастеров)\n- Статистику (количество\
        \ заказов, рекомендации)\n\n## Примеры использования:\n\n**Просмотр мастера:**\n\
        ```\nGET /api/auth/user/5/\n```\n\n**Просмотр водителя:**\n```\nGET /api/auth/user/10/\n\
        ```\n        "
      summary: Получить информацию о пользователе по ID
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        description: ID пользователя
        required: true
      tags:
      - User Profile
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Пользователь не найден
          description: ''
  /api/auth/user/location/:
    put:
      operationId: auth_user_location_update
      description: 'JSON or form body: `latitude`, `longitude` (both required, WGS84)
        and optional `address`.'
      summary: Update user coordinates
      tags:
      - User Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLocationUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLocationUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  user:
                    type: object
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
          description: ''
  /api/auth/user/register-profile/:
    post:
      operationId: auth_user_register_profile_create
      description: multipart/form-data. Updates profile for request.user. If email
        is not verified yet, sends HTML email with link `{FRONTEND_BASE}/email-verification/token={uuid}`.
        If already verified, returns a message that you are already registered.
      summary: Register / complete profile + email verification
      tags:
      - User Profile
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfileRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  user:
                    type: object
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
          description: ''
  /api/car/:
    get:
      operationId: car_retrieve
      description: Получить список машин пользователя
      summary: Получить список машин
      tags:
      - Cars
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
    post:
      operationId: car_create
      description: 'Используйте **multipart/form-data**: поля `category` (id), `brand`,
        `model`, `year`, файл `image`. Числа в форме передаются строками. JSON без
        файла тоже поддерживается.'
      summary: Создать новую машину
      tags:
      - Cars
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CarWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CarWriteRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/CarWriteRequest'
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
  /api/car/{id}/:
    get:
      operationId: car_retrieve_2
      description: Получить детали машины
      summary: Получить детали машины
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Cars
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
    put:
      operationId: car_update
      description: 'Полное обновление: **multipart/form-data** с полями `category`,
        `brand`, `model`, `year`, `image` (или JSON без загрузки файла).'
      summary: Обновить машину
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Cars
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CarWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CarWriteRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/CarWriteRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
    patch:
      operationId: car_partial_update
      description: Частичное обновление через **multipart/form-data** (например, только
        `image`) или JSON.
      summary: Частичное обновление машины
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Cars
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCarWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCarWriteRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCarWriteRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
    delete:
      operationId: car_destroy
      description: Удалить машину
      summary: Удалить машину
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Cars
      security:
      - jwtAuth: []
      responses:
        '204':
          content:
            application/json:
              schema:
                description: Машина удалена
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
  /api/car/stats/:
    get:
      operationId: car_stats_retrieve
      description: Получить статистику машин пользователя
      summary: Получить статистику машин
      tags:
      - Cars
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_cars:
                    type: integer
                  cars_by_category:
                    type: object
                  cars_by_brand:
                    type: object
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
  /api/categories/categories/:
    get:
      operationId: categories_categories_list
      description: "\n        Возвращает только **основные (main) категории** — у\
        \ которых нет родителя (`parent` = null).\n        Подкатегории смотрите в\
        \ `GET /api/categories/subcategories/?parent_id=...`.\n\n        **Фильтрация:**\n\
        \        - Параметр `type` — по типу (TypeCategory): `by_car`, `by_order`\n\
        \        - Без `type` — все основные категории\n\n        **Примеры:**\n \
        \       - `/api/categories/categories/` — все main-категории\n        - `/api/categories/categories/?type=by_order`\
        \ — main по заказам / услугам\n        "
      summary: Получить список категорий
      parameters:
      - in: query
        name: type
        schema:
          type: string
          enum:
          - by_car
          - by_order
        description: 'Фильтр по типу категории: by_car — машина, by_order — заказы/услуги.'
      tags:
      - Categories
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
          description: ''
  /api/categories/subcategories/:
    get:
      operationId: categories_subcategories_list
      description: "\n        Список подкатегорий для указанной **основной** категории.\n\
        \        `parent_id` — ID main-категории (без родителя). Если категория не\
        \ main или не найдена — 404.\n        "
      summary: Подкатегории по основной категории
      parameters:
      - in: query
        name: parent_id
        schema:
          type: integer
