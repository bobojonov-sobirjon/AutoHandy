      description: "\n## Описание\nЗавершает заказ, устанавливая статус **COMPLETED**\
        \ (Завершен).\n\n## \U0001F3AF Когда использовать?\n- ✅ Работа по заказу выполнена\n\
        - ✅ Клиент доволен результатом\n- ✅ Заказ готов к закрытию\n- ✅ Можно оставить\
        \ рейтинг и отзыв\n\n## Требования:\n- Заказ должен существовать\n- Пользователь\
        \ должен быть авторизован\n\n## Пример запроса:\n```\nPOST /api/order/5/complete/\n\
        ```\n\n## Response:\n```json\n{\n  \"message\": \"Заказ успешно завершен\"\
        ,\n  \"order\": {\n    \"id\": 5,\n    \"status\": \"completed\",\n    \"\
        status_display\": \"Завершен\",\n    \"user\": {...},\n    \"master\": {...},\n\
        \    \"text\": \"Замена масла\",\n    \"created_at\": \"2026-01-30T10:00:00Z\"\
        \n  }\n}\n```\n\n## Workflow:\n1. Мастер завершает работу по заказу\n2. Отправляет\
        \ POST запрос на `/api/order/{order_id}/complete/`\n3. Заказ переходит в статус\
        \ **COMPLETED**\n4. Клиент может оставить рейтинг и отзыв\n        "
      summary: Завершить заказ
      parameters:
      - in: path
        name: order_id
        schema:
          type: integer
        required: true
      tags:
      - Order (Master) — Complete
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Заказ успешно завершен
                  order:
                    $ref: '#/components/schemas/Order'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Заказ не найден
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Authentication credentials were not provided.
          description: ''
