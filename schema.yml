  /api/master/masters/list/:
    get:
      operationId: master_masters_list_list
      description: "\n        Список мастеров. **Без параметров** — все записи из\
        \ БД.\n        \n        **Опциональные query-параметры:**\n        - `category`\
        \ — ID категории типа **by_order** (умный поиск по навыкам / дереву parent)\n\
        \        - `name` — текстовый поиск: услуги (подкатегории), город/адрес, имя/телефон\
        \ пользователя-мастера\n        - `lat` / `long` - геоточка пользователя;\
        \ вместе с `radius` (км, по умолчанию 10) оставляют мастеров в радиусе\n \
        \       \n        **Примеры:**\n        - `/api/master/masters/list/` — полный\
        \ список\n        - `/api/master/masters/list/?category=1` - мастера по категории\
        \ (умный поиск)\n        - `/api/master/masters/list/?name=Авто` - поиск по\
        \ тексту\n        - `/api/master/masters/list/?lat=41.3111&long=69.2797&radius=5`\
        \ - мастера в радиусе 5 км\n        - `/api/master/masters/list/?category=1&lat=41.3111&long=69.2797&radius=10`\
        \ - комбинация фильтров\n        \n        **Поиск по категории:** только\
        \ **by_order** (каталог услуг / заказов). Для `by_car` вернётся ошибка 400.\n\
        \        \n        **Геолокация:**\n        - Расчет расстояния выполняется\
        \ по формуле Haversine\n        - Возвращаются только мастера с заполненными\
        \ координатами (latitude и longitude)\n        - Поле `distance` добавляется\
        \ в ответ (расстояние в километрах от точки пользователя)\n        "
      summary: Получить список мастеров (все или с фильтрами)
      parameters:
      - in: query
        name: category
        schema:
          type: integer
        description: ID категории by_order (фильтр по навыкам мастера)
      - in: query
        name: lat
        schema:
          type: number
          format: double
        description: Широта текущего местоположения пользователя
      - in: query
        name: long
        schema:
          type: number
          format: double
        description: Долгота текущего местоположения пользователя
      - in: query
        name: name
        schema:
          type: string
        description: 'Поиск: услуги, город/адрес, имя или телефон мастера (user)'
      - in: query
        name: radius
        schema:
          type: number
          format: double
        description: Радиус поиска в километрах (по умолчанию 10 км)
      tags:
      - Masters
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Master'
          description: ''
