  /api/car/stats/:
    get:
      operationId: car_stats_retrieve
      description: Получить статистику машин пользователя
      summary: Получить статистику машин
      tags:
      - Cars
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_cars:
                    type: integer
                  cars_by_category:
                    type: object
                  cars_by_brand:
                    type: object
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
  /api/categories/categories/:
    get:
      operationId: categories_categories_list
      description: "\n        Получить список всех категорий с возможностью фильтрации\
        \ по типу.\n        \n        **Фильтрация:**\n        - Используйте параметр\
        \ `type` для фильтрации категорий по типу (TypeCategory)\n        - Доступные\
        \ значения фильтра:\n          * `by_master` - Категории для мастерских (услуги\
        \ мастеров)\n          * `by_car` - Категории для автомобилей (марки, модели\
        \ и т.д.)\n          * `by_order` - Категории для заказов\n        - Если\
        \ параметр `type` не указан, возвращаются все категории\n        \n      \
        \  **Примеры использования:**\n        - `/api/categories/categories/` - все\
        \ категории\n        - `/api/categories/categories/?type=by_master` - только\
        \ категории мастеров\n        - `/api/categories/categories/?type=by_car`\
        \ - только категории машин\n        - `/api/categories/categories/?type=by_order`\
        \ - только категории заказов\n        \n        **Поля в ответе:**\n     \
        \   - `id` - ID категории\n        - `name` - Название категории\n       \
        \ - `type_category` - Тип категории (by_master, by_car, by_order)\n      \
        \  - `icon` - URL иконки категории (полный URL)\n        - `created_at` -\
        \ Дата создания\n        - `updated_at` - Дата обновления\n        "
      summary: Получить список категорий
      parameters:
      - in: query
        name: type
        schema:
          type: string
          enum:
          - by_car
          - by_master
          - by_order
        description: 'Фильтр по типу категории (TypeCategory): by_master - Категории
          мастеров, by_car - Категории машин, by_order - Категории заказов'
      tags:
      - Categories
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
          description: ''
  /api/master/masters/:
    get:
      operationId: master_masters_list
      description: "\n        Получить профили мастерских текущего пользователя. Доступно\
        \ для всех пользователей (публичный доступ).\n        \n        **Логика поиска:**\n\
        \        - Если пользователь авторизован, возвращаются все мастерские где\
        \ он является:\n          1. Владельцем (создал мастерскую)\n          2.\
        \ ИЛИ сотрудником (добавлен через MasterEmployee)\n        - Если пользователь\
        \ не авторизован, возвращается пустой список\n        "
      summary: Получить профиль мастера
      tags:
      - Masters
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Master'
          description: ''
    post:
      operationId: master_masters_create
      description: "\n        Создание нового профиля мастера. Эта операция доступна\
        \ ТОЛЬКО пользователям с ролью 'Owner'.\n        \n        **ВАЖНО**: Вы должны\
        \ быть в группе 'Owner' для выполнения этой операции!\n        \n        **ВСЕ\
        \ ПОЛЯ НЕОБЯЗАТЕЛЬНЫ!** Можно отправить пустой объект {} или заполнить только\
        \ нужные поля:\n        \n        - `name`: Название мастерской (строка, например:\
        \ \"СТО Авто-Сервис\")\n        - `city`: Город мастерской (строка)\n    \
        \    - `address`: Адрес мастерской (строка)\n        - `phone`: Номер телефона\
        \ мастерской (строка, например: +998901234567)\n        - `working_time`:\
        \ Режим работы (строка, например: \"Пн-Пт: 09:00-18:00, Сб: 10:00-16:00\"\
        )\n        - `latitude`: Широта местоположения (число от -90 до 90, например:\
        \ 41.3111)\n        - `longitude`: Долгота местоположения (число от -180 до\
        \ 180, например: 69.2797)\n        - `description`: Описание мастерской и\
        \ услуг (текст)\n        - `category`: Список ID категорий услуг (массив чисел,\
        \ например: [1, 2, 3])\n        - `services`: Список услуг с ценами (массив\
        \ объектов, каждый содержит: name, price_from, price_to, category)\n     \
        \   - `card_number`: Номер банковской карты для платежей (строка, до 19 символов)\n\
        \        - `card_expiry_month`: Месяц истечения срока карты (число 1-12)\n\
        \        - `card_expiry_year`: Год истечения срока карты (число, например:\
        \ 2026)\n        - `card_cvv`: CVV код карты (строка, 3-4 цифры)\n       \
        \ \n        **Примечания:**\n        - User автоматически берется из текущего\
        \ авторизованного пользователя\n        - Категории должны существовать в\
        \ базе данных и иметь тип 'by_master'\n        - После создания мастерской,\
