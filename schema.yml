                  latitude: 41.3111
                  longitude: 69.2797
                  phone: '+998901234567'
                  working_time: 'Пн-Пт: 09:00-18:00, Сб: 10:00-16:00'
                  description: Автосервис с полным спектром услуг. Работаем с 2010
                    года. Опытные мастера, качественные запчасти.
