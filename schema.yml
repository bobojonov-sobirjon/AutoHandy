      description: "\nВсе **by_order** подкатегории (есть `parent`), сгруппированные\
        \ по основной категории.\n\nДля каждой подкатегории:\n- **`has_skill`** —\
        \ есть ли у мастера строка в `MasterServiceItems` с этой категорией\n- **`price`**\
        \ — текущая цена или `null`\n\n**Query (необязательно):**\n- `only_related_groups=true`\
        \ — только группы (родители), где у мастера уже есть хотя бы один навык\n\
        \  (удобно при узкой специализации: показать «соседей» по тому же направлению).\
        \ Если навыков ещё нет — показываются все группы.\n\nJWT, группа **Master**;\
        \ доступ только к **своей** мастерской (`master_id`).\n        "
      parameters:
      - in: path
        name: master_id
        schema:
          type: integer
        required: true
      - in: query
        name: only_related_groups
        schema:
          type: boolean
        description: Только parent-группы, где уже есть хотя бы один skill (при skill_count>0)
      tags:
      - Masters
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: OK
