  /api/master/images/:
    post:
      operationId: master_images_create
      description: "\n        Добавление новых изображений к существующему мастеру.\n\
        \        \n        **Важные моменты:**\n        - Можно загрузить сразу несколько\
        \ изображений (multiple files)\n        - Старые изображения **сохраняются**\
        \ - новые добавляются к существующим\n        - Формат запроса: `multipart/form-data`\n\
        \        - Поддерживаемые форматы: JPG, PNG, GIF, WEBP\n        \n       \
        \ **Request Body (multipart/form-data):**\n        - `master_id`: ID мастера\
        \ (integer, обязательно)\n        - `images`: Список изображений (multiple\
        \ files, обязательно)\n        \n        **Пример использования в curl:**\n\
        \        ```bash\n        curl -X POST \"http://localhost:8000/api/master/images/\"\
        \ \\\n          -H \"Authorization: Bearer YOUR_TOKEN\" \\\n          -F \"\
        master_id=1\" \\\n          -F \"images=@photo1.jpg\" \\\n          -F \"\
        images=@photo2.jpg\" \\\n          -F \"images=@photo3.jpg\"\n        ```\n\
        \        \n        **Ответ:** Возвращает обновленный список всех изображений\
        \ мастера.\n        "
      summary: Добавить изображения к мастеру
      tags:
      - Master Images
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                master_id:
                  type: integer
                  description: ID мастера
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Список изображений для загрузки
              required:
              - master_id
              - images
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                description: Изображения успешно добавлены
                content:
                  application/json:
                    example:
                      message: Успешно добавлено 2 изображений
                      images:
                      - id: 1
                        image: http://localhost:8000/media/master_images/photo1.jpg
                        created_at: '2026-01-27T20:00:00Z'
                        updated_at: '2026-01-27T20:00:00Z'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
  /api/master/images/{image_id}/:
    put:
      operationId: master_images_update
      description: "\n        Замена существующего изображения мастера на новое.\n\
        \        \n        **Важные моменты:**\n        - Старое изображение будет\
        \ **удалено** (файл и запись из БД)\n        - Новое изображение загрузится\
        \ на его место\n        - Формат запроса: `multipart/form-data`\n        -\
        \ Поддерживаемые форматы: JPG, PNG, GIF, WEBP\n        \n        **Request\
        \ Body (multipart/form-data):**\n        - `image`: Новое изображение (file,\
        \ обязательно)\n        \n        **Пример использования в curl:**\n     \
        \   ```bash\n        curl -X PUT \"http://localhost:8000/api/master/images/5/\"\
        \ \\\n          -H \"Authorization: Bearer YOUR_TOKEN\" \\\n          -F \"\
        image=@new_photo.jpg\"\n        ```\n        \n        **Ответ:** Возвращает\
        \ информацию об обновленном изображении.\n        "
      summary: Заменить изображение мастера
      parameters:
      - in: path
        name: image_id
        schema:
          type: integer
        required: true
      tags:
      - Master Images
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Новое изображение
              required:
              - image
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Изображение успешно обновлено
                content:
                  application/json:
                    example:
                      id: 1
                      image: http://localhost:8000/media/master_images/new_photo.jpg
                      created_at: '2026-01-27T20:00:00Z'
                      updated_at: '2026-01-27T20:15:00Z'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
