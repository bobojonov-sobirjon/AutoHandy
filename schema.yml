    post:
      operationId: master_masters_create
      description: "\n        Создание нового профиля мастера. Доступно только пользователям\
        \ в группе **Master**.\n        \n        **ВАЖНО**: JWT обязателен; пользователь\
        \ должен быть в группе Django `Master`.\n        \n        **ФОРМАТ ЗАПРОСА**:\
        \ multipart/form-data (для загрузки изображений)\n        \n        **ВСЕ\
        \ ПОЛЯ НЕОБЯЗАТЕЛЬНЫ!** Можно отправить пустой объект {} или заполнить только\
        \ нужные поля:\n        \n        - `city`: Город мастерской (строка)\n  \
        \      - `address`: Адрес мастерской (строка)\n        - `phone`: Номер телефона\
        \ мастерской (строка, например: +998901234567)\n        - `working_time`:\
        \ Режим работы (строка, например: \"Пн-Пт: 09:00-18:00, Сб: 10:00-16:00\"\
        )\n        - `latitude` / `longitude`: точка на карте (мастерская / рабочая\
        \ зона)\n        - `service_area_radius_miles`: **15**, **45** или **100**\
        \ (мили) — радиус приёма заказов; задаётся вместе с `latitude` и `longitude`\n\
        \        - `description`: Описание мастерской и услуг (текст)\n        - `images`:\
        \ Файлы (multipart) — поле можно повторять несколько раз для нескольких фото\n\
        \        \n        **Навыки (цены по подкатегориям)** не передаются при создании.\
        \ Используйте\n        `POST /api/master/service-items/` (`master_id` не обязателен,\
        \ если у вас одна мастерская).\n        \n        **Примечания:**\n      \
        \  - User автоматически берется из текущего авторизованного пользователя\n\
        \        - После создания мастерской пользователь остаётся/снова добавляется\
        \ в группу 'Master' (если ещё не был)\n        - Можно создать мастерскую\
        \ вообще без данных и заполнить потом через PUT/PATCH\n        "
      summary: Создать профиль мастера (только группа Master)
      tags:
      - Masters
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MasterCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MasterCreateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/MasterCreateRequest'
            examples:
              ПолныйПримерСозданияМастерской:
                value:
                  city: Ташкент
                  address: ул. Амира Темура, 15
                  latitude: 41.3111
                  longitude: 69.2797
                  phone: '+998901234567'
                  working_time: 'Пн-Пт: 09:00-18:00, Сб: 10:00-16:00'
                  description: Автосервис с полным спектром услуг. Работаем с 2010
                    года. Опытные мастера, качественные запчасти.
                summary: Полный пример создания мастерской
              МинимальныйПример:
                value:
                  city: Москва
                  phone: '+79991234567'
                summary: Минимальный пример
              ПустойЗапрос(можноСоздатьВообщеБезДанных):
                value: {}
                summary: Пустой запрос (можно создать вообще без данных)
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Master'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Ошибка валидации данных
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: 'Нет доступа: нужна группа ''Master'''
          description: ''
