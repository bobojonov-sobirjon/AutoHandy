                value:
                  name: Мой Автосервис
                  city: Москва
                  phone: '+79991234567'
                summary: Минимальный пример
              ПустойЗапрос(можноСоздатьВообщеБезДанных):
                value: {}
                summary: Пустой запрос (можно создать вообще без данных)
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MasterCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MasterCreateRequest'
          '*/*':
            schema:
              $ref: '#/components/schemas/MasterCreateRequest'
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Master'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Ошибка валидации данных
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Только пользователи с ролью Owner могут создавать мастерские
          description: ''
