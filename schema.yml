          type: string
          format: date
        description: 'Date for slot check (YYYY-MM-DD). Example: 2026-01-30'
        required: true
      - in: query
        name: master_id
        schema:
          type: integer
        description: 'Master ID (required). Example: 5'
        required: true
      tags:
      - Order (Driver) — Time slots
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
